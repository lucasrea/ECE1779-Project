apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  namespace: golden-gate
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;

    CREATE TABLE IF NOT EXISTS semantic_cache (
        id SERIAL PRIMARY KEY,
        embedding vector(384),
        messages_hash TEXT UNIQUE NOT NULL,
        messages_text TEXT NOT NULL,
        response JSONB NOT NULL,
        provider TEXT NOT NULL,
        model TEXT NOT NULL,
        created_at TIMESTAMPTZ DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_cache_embedding
        ON semantic_cache USING hnsw (embedding vector_cosine_ops);

    CREATE TABLE IF NOT EXISTS api_keys (
        id BIGSERIAL PRIMARY KEY,
        key_prefix TEXT UNIQUE NOT NULL,
        key_hash TEXT UNIQUE NOT NULL,
        owner_name TEXT NOT NULL,
        scopes TEXT[] NOT NULL DEFAULT ARRAY['chat:completions']::TEXT[],
        created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        last_used_at TIMESTAMPTZ,
        revoked_at TIMESTAMPTZ
    );

    CREATE INDEX IF NOT EXISTS idx_api_keys_active_prefix
        ON api_keys (key_prefix)
        WHERE revoked_at IS NULL;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: golden-gate
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "gateway"
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: db-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: db-init
          configMap:
            name: db-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: golden-gate
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
